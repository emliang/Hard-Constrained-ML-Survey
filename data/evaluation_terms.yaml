
angles:
  constraint_satisfaction:
    question: What supports feasibility?
    dimensions:
      - guarantee_type
      - violation_residuals
      - tolerances
  output_utility:
    question: Is the constrained output useful?
    dimensions:
      - task_accuracy
      - sample_quality
      - downstream_utility
  training_and_inference_cost:
    question: What is paid for enforcement?
    dimensions:
      - training_overhead
      - inference_latency
      - solver_or_sampler_calls
      - memory_use
  scope_and_assumptions:
    question: Where does the claim apply?
    dimensions:
      - constraint_class
      - input_or_sample_domain
      - solver_or_oracle_or_map_validity
      - discretization_assumptions
