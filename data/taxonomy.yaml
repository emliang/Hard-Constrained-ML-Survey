
task_families:
  hard_constrained_prediction:
    description: Methods that return feasible predictions or decisions.
    branches:
      - training_time_losses_and_dual_methods
      - post_processing_projection_and_repair
      - structured_output_or_optimization_layers
      - explicit_feasibility_mappings
      - constraint_parameterization
      - verification_and_network_editing
  hard_constrained_generation:
    description: Methods that generate samples under explicit constraints.
    branches:
      - pushforward_generators
      - autoregressive_and_constrained_decoding
      - diffusion_and_flow_matching
      - constrained_domain_samplers
      - inference_time_guidance
      - constraint_aware_training_or_finetuning
constraint_families:
  continuous:
    - boxes
    - affine_sets
    - cones
    - convex_sets
    - nonlinear_equalities
    - nonlinear_inequalities
    - manifolds
  discrete_or_symbolic:
    - cardinality
    - logical_constraints
    - grammar_or_automata_constraints
    - integer_and_mixed_integer_constraints
  instance_dependent:
    - input_dependent_feasible_sets
    - conditioning_dependent_generation_domains
guarantee_families:
  - exact_by_construction
  - solver_tolerance_exactness
  - certified_or_verified_feasibility
  - convergence_or_asymptotic_feasibility
  - probabilistic_feasibility
  - empirical_feasibility
